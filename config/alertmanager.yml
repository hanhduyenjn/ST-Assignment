global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "critical"
      continue: false

receivers:
  - name: "default"
    # Placeholder — wire up Slack/PagerDuty/email in production
    # webhook_configs:
    #   - url: "http://your-webhook-endpoint"

  - name: "critical"
    # Placeholder — wire up a high-priority channel in production
    # webhook_configs:
    #   - url: "http://your-critical-webhook-endpoint"

inhibit_rules:
  # Suppress warning-level alerts when a critical alert is firing for the same site
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["site_id"]
