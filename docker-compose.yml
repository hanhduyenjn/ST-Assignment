version: "3.9"

# Credentials and config are loaded from .env (see .env.example for the template).
# For the ST assignment the .env file is committed so the stack runs as-is.

networks:
  network-health-net:
    driver: bridge

volumes:
  minio-data:
  clickhouse-data:
  prometheus-data:
  grafana-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  postgres-data:
  airflow-logs:

# ─── Airflow common config (shared by scheduler + webserver) ──────────────────
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  networks: [network-health-net]
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    SPARK_MASTER_URL: ${SPARK_MASTER_URL}
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags:ro
    - ./src:/opt/airflow/src:ro
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ─── Kafka coordination ────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    hostname: zookeeper
    networks: [network-health-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: ruok,srvr,stat
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Message broker ────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    hostname: kafka
    networks: [network-health-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"       # external access from host
      - "29092:29092"     # internal listener for containers
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168          # 7 days
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false" # topics created explicitly below
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Kafka topic initialisation ────────────────────────────────────────────
  # Creates the 4 topics defined in section 11 of the implementation plan.
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    networks: [network-health-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      kafka-topics --create --if-not-exists --topic raw.interface.stats --bootstrap-server kafka:29092  --partitions 3 --replication-factor 1 --config retention.ms=604800000

      kafka-topics --create --if-not-exists --topic raw.syslogs --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --config retention.ms=604800000

      kafka-topics --create --if-not-exists --topic raw.inventory --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --config cleanup.policy=compact --config retention.ms=-1

      kafka-topics --create --if-not-exists --topic output.anomaly.alerts --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --config retention.ms=604800000

      echo 'Kafka topics created.'
      "
    restart: on-failure

  # ─── Object store (on-prem S3-compatible) ─────────────────────────────────
  minio:
    image: firstfinger/minio:1.7.3
    container_name: minio
    hostname: minio
    networks: [network-health-net]
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_PORT: "9000"
      MINIO_CONSOLE_PORT: "9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO bucket initialisation ──────────────────────────────────────────
  # Creates the lakehouse bucket and top-level prefixes on first start.
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: minio-init
    networks: [network-health-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} && \
      mc mb --ignore-existing local/lakehouse && \
      mc mb --ignore-existing local/lakehouse/bronze && \
      mc mb --ignore-existing local/lakehouse/silver && \
      mc mb --ignore-existing local/lakehouse/checkpoints && \
      mc mb --ignore-existing local/lakehouse/models && \
      echo 'MinIO buckets ready.'
      "
    env_file: .env
    restart: on-failure

  # ─── Iceberg REST Catalog ──────────────────────────────────────────────────
  iceberg-rest:
    image: tabulario/iceberg-rest:0.10.0
    container_name: iceberg-rest
    hostname: iceberg-rest
    networks: [network-health-net]
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://lakehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    env_file: .env
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8181 && echo -e 'GET /v1/config HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Iceberg namespace initialisation ─────────────────────────────────────
  # Creates the bronze and silver namespaces via REST API.
  iceberg-init:
    build:
      context: .
      dockerfile: docker/Dockerfile.iceberg-init
    container_name: iceberg-init
    networks: [network-health-net]
    depends_on:
      minio-init:
        condition: service_completed_successfully
      iceberg-rest:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      curl -sf -X POST http://iceberg-rest:8181/v1/namespaces -H 'Content-Type: application/json' -d '{\"namespace\":[\"bronze\"]}' || true;

      curl -sf -X POST http://iceberg-rest:8181/v1/namespaces -H 'Content-Type: application/json' -d '{\"namespace\":[\"silver\"]}' || true;

      python3 -m sql.iceberg.ddl.init &&

      echo 'Iceberg namespaces ready.';
      "
    env_file: .env
    restart: on-failure

  # ─── ClickHouse (Gold layer + analytics) ──────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    container_name: clickhouse
    hostname: clickhouse
    networks: [network-health-net]
    depends_on:
      minio-init:
        condition: service_completed_successfully
      iceberg-init:
        condition: service_completed_successfully
    ports:
      - "8123:8123"   # HTTP interface (used by Python clickhouse-connect)
      - "9009:9009"   # native TCP
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # DDL files are applied in filename order on first startup
      - ./sql/clickhouse/ddl:/docker-entrypoint-initdb.d:ro
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ─── Spark Master ─────────────────────────────────────────────────────────
  spark-master:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    networks: [network-health-net]
    ports:
      - "8080:8080"   # Spark Master UI
      - "7077:7077"   # Spark submit endpoint
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    healthcheck:
      test: ["CMD", "/opt/bitnami/python/bin/python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Spark Worker ─────────────────────────────────────────────────────────
  spark-worker:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-worker
    hostname: spark-worker
    networks: [network-health-net]
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8081:8081"   # Spark Worker UI
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: ${SPARK_MASTER_URL}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    env_file: .env

  # ─── Prometheus (metrics collection) ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    hostname: prometheus
    networks: [network-health-net]
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Alertmanager ─────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    hostname: alertmanager
    networks: [network-health-net]
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  # ─── Grafana (dashboards) ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    container_name: grafana
    hostname: grafana
    networks: [network-health-net]
    depends_on:
      clickhouse:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/pipeline.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/dashboards:/etc/grafana/dashboards:ro
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Kafka UI ─────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    hostname: kafka-ui
    networks: [network-health-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # ─── Airflow metadata DB ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    hostname: postgres
    networks: [network-health-net]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Airflow DB init (runs once, then exits) ──────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com &&
      echo 'Airflow initialised.'
      "
    restart: on-failure

  # ─── Airflow Scheduler ────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_healthy
    restart: unless-stopped

  # ─── Airflow Webserver ────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    hostname: airflow-webserver
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8085:8080"   # Airflow UI (8080 is taken by Spark Master)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Pipeline application (consumers + all pipeline modes) ────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: app
    hostname: app
    networks: [network-health-net]
    depends_on:
      kafka:
        condition: service_healthy
      iceberg-rest:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    env_file: .env
    ports:
      - "${PROMETHEUS_PORT:-8000}:8000"   # Prometheus metrics + FastAPI bridge
    volumes:
      - ./data:/app/data:ro
    restart: unless-stopped
